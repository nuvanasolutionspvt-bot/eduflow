{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">

    <div class="d-flex justify-content-between mb-3">
      <h5 class="mb-0">ID Card Preview</h5>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-outline-success" onclick="downloadIdCardFromServer(this, '{{ jpg_url }}')">
          Download JPG
        </button>
        <button type="button" class="btn btn-primary" onclick="printIdCardPreviewFrame()">
          Print ID Card
        </button>
      </div>
    </div>

    <!-- Preview Frame -->
    <iframe
      id="idCardPreviewFrame"
      src="{{ preview_url }}"
      title="ID Card Preview"
      style="width:100%; height:1100px; border:1px solid #dee2e6; border-radius:6px; background:#fff;"
      loading="lazy">
    </iframe>

  </div>
</div>
{% endblock %}


{% block extra_js %}
<script>
function downloadIdCardFromServer(button, downloadUrl) {
  const previousLabel = button ? button.textContent : '';
  if (button) {
    button.disabled = true;
    button.textContent = 'Starting download...';
  }

  window.location.href = downloadUrl;

  window.setTimeout(() => {
    if (button) {
      button.disabled = false;
      button.textContent = previousLabel || 'Download JPG';
    }
  }, 1200);
}

function printIdCardPreviewFrame() {

  const frame = document.getElementById('idCardPreviewFrame');
  if (!frame || !frame.contentWindow) return;

  const win = frame.contentWindow;
  const doc = win.document;

  if (!doc) return;

  // ensure colors print correctly
  let style = doc.getElementById('print-helper-style-idcard');

  if (!style) {
    style = doc.createElement('style');
    style.id = 'print-helper-style-idcard';

    style.innerHTML = `
      @media print {

        html, body {
          margin:0 !important;
          padding:0 !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

      }
    `;

    doc.head.appendChild(style);
  }

  // wait for images
  const imgs = Array.from(doc.images || []);

  const pending = imgs
    .filter(img => !img.complete)
    .map(img => new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve;
    }));

  Promise.all(pending).then(() => {
    win.focus();
    win.print();
  });

}

</script>
{% endblock %}
